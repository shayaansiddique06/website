<!-- @dsCard group="Components" name="Buttons and links" subtitle="Primary pill · secondary · text link · filter chips" width="720" height="420" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../fonts/fonts.css">
<link rel="stylesheet" href="../styles.css">
<style>
body{padding:32px;display:grid;gap:32px}
.row{display:flex;gap:16px;flex-wrap:wrap;align-items:center}
.lbl{font-family:var(--font-mono);font-size:0.6875rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);display:block;margin-bottom:12px}
</style>
</head>
<body>
<div><span class="lbl">Primary CTA — the only pill on the page</span>
  <div class="row"><a class="btn-primary" href="#">Request dataset access</a></div></div>
<div><span class="lbl">Secondary + text link</span>
  <div class="row"><a class="btn-secondary" href="#">Request dataset access</a><a class="link-underline" href="#">For investors</a></div></div>
<div><span class="lbl">Verdict filter chips — active state per verdict</span>
  <div class="row filters">
    <button type="button" class="chip" data-filter="all" aria-pressed="true">All</button>
    <button type="button" class="chip" data-filter="faithful" aria-pressed="false">Faithful</button>
    <button type="button" class="chip" data-filter="unfaithful" aria-pressed="true">Unfaithful</button>
    <button type="button" class="chip" data-filter="uncertain" aria-pressed="true">Uncertain</button>
    <button type="button" class="chip" data-filter="pending" aria-pressed="true">Pending</button>
  </div></div>
</body>
</html>
