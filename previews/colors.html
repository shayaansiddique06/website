<!-- @dsCard group="Colors" name="Color tokens" subtitle="Surfaces, text, accent, verdict palette" width="880" height="560" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../fonts/fonts.css">
<link rel="stylesheet" href="../styles.css">
<style>
body{padding:32px}
.swatches{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;max-width:820px}
.sw{border:1px solid var(--border);border-radius:8px;overflow:hidden}
.sw .chipbox{height:64px}
.sw .meta{padding:8px 12px;font-family:var(--font-mono);font-size:0.75rem;color:var(--text-muted);display:grid;gap:2px}
.sw .meta b{color:var(--text);font-weight:500}
h2{margin-bottom:24px}
</style>
</head>
<body>
<h2>Color tokens</h2>
<div class="swatches">
  <div class="sw"><div class="chipbox" style="background:#0A0C0B"></div><div class="meta"><b>--bg</b>#0A0C0B</div></div>
  <div class="sw"><div class="chipbox" style="background:#101312"></div><div class="meta"><b>--surface</b>#101312</div></div>
  <div class="sw"><div class="chipbox" style="background:#161A18"></div><div class="meta"><b>--surface-2</b>#161A18</div></div>
  <div class="sw"><div class="chipbox" style="background:rgba(255,255,255,.08)"></div><div class="meta"><b>--border</b>white @ 8%</div></div>
  <div class="sw"><div class="chipbox" style="background:#E8ECEA"></div><div class="meta"><b>--text</b>#E8ECEA</div></div>
  <div class="sw"><div class="chipbox" style="background:#8A938E"></div><div class="meta"><b>--text-muted</b>#8A938E</div></div>
  <div class="sw"><div class="chipbox" style="background:#21C46A"></div><div class="meta"><b>--accent</b>#21C46A · text-safe</div></div>
  <div class="sw"><div class="chipbox" style="background:#3BE38A"></div><div class="meta"><b>--accent-bright</b>#3BE38A · glow/hover only</div></div>
  <div class="sw"><div class="chipbox" style="background:#157A43"></div><div class="meta"><b>--accent-dim</b>#157A43 · borders</div></div>
  <div class="sw"><div class="chipbox" style="background:#E5484D"></div><div class="meta"><b>--v-unfaithful</b>#E5484D</div></div>
  <div class="sw"><div class="chipbox" style="background:#E8B339"></div><div class="meta"><b>--v-uncertain</b>#E8B339</div></div>
  <div class="sw"><div class="chipbox" style="background:#5A6B63"></div><div class="meta"><b>--v-pending</b>#5A6B63 · keylines; ink #7E8C85</div></div>
</div>
</body>
</html>
